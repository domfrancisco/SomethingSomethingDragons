<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something Something Dragons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://use.typekit.net/nni0axt.css" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <canvas id="particleCanvas" aria-hidden="true"></canvas>

  <header class="page-header">
    <h1 class="layered-title" aria-label="Something Something Dragons">
      <span class="title-block">Something Something Dragons</span>
      <span class="title-melt">Something Something Dragons</span>
      <span class="title-freeze">Something Something Dragons</span>
      <span class="title-chip">Something Something Dragons</span>
    </h1>
    <div class="menu-container">
      <button id="menuButton" type="button" class="menu-btn" aria-label="Menu" aria-expanded="false" aria-controls="menuDropdown">
        <span class="menu-icon" aria-hidden="true"></span>
      </button>
      <div id="menuDropdown" class="menu-dropdown" hidden>
        <button type="button" class="menu-item">
          <span class="menu-item-label" aria-label="Info">
            <span class="menu-item-space">Info</span>
            <span class="menu-item-discovery">Info</span>
          </span>
        </button>
        <button id="menuSaveState" type="button" class="menu-item">
          <span class="menu-item-label" aria-label="Save State">
            <span class="menu-item-space">Save State</span>
            <span class="menu-item-discovery">Save State</span>
          </span>
        </button>
        <button id="menuLoadState" type="button" class="menu-item">
          <span class="menu-item-label" aria-label="Load State">
            <span class="menu-item-space">Load State</span>
            <span class="menu-item-discovery">Load State</span>
          </span>
        </button>
        <button id="menuResetState" type="button" class="menu-item">
          <span class="menu-item-label" aria-label="Reset">
            <span class="menu-item-space">Reset</span>
            <span class="menu-item-discovery">Reset</span>
          </span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-grid">
    <div class="cards-panel">
      <div class="flight-column">
        <div class="app-shell primary-shell">
          <section class="panel flight-card-panel">
            <div class="flight-cards-stack"></div>
          </section>
        </div>
        <div class="flight-card-actions">
          <button type="button" class="fly-btn" aria-label="Fly">
            <span class="fly-btn-space" aria-hidden="true">Fly</span>
            <span class="fly-btn-discovery" aria-hidden="true">Fly</span>
          </button>
          <div class="deck-controls">
            <label class="deck-color-select-shell" for="deckColorSelect" aria-label="Action deck color">
              <select id="deckColorSelect" class="deck-color-select" aria-label="Action deck color"></select>
            </label>
            <button type="button" class="deck-btn" aria-label="Deck">
              <span class="deck-btn-space" aria-hidden="true">Deck</span>
              <span class="deck-btn-discovery" aria-hidden="true">Deck</span>
            </button>
          </div>
        </div>
      </div>

      <div class="action-cards-panel" aria-label="Action cards">
        <article class="app-shell action-card-shell deck-indicator-shell">
          <section class="panel deck-indicator-content">
            <div class="deck-stacks">
              <div class="deck-stack">
                <div id="deckStackVisual" class="stack-visual" aria-label="Remaining deck cards"></div>
              </div>
              <div class="discard-stack">
                <div id="discardStackVisual" class="stack-visual" aria-label="Discarded cards"></div>
              </div>
            </div>
            <div class="deck-counter">
              <span id="deckCounter" class="counter-text">30/30</span>
            </div>
          </section>
        </article>
      </div>
    </div>
  </main>

  <script src="./scripts/action-card-data.js" defer></script>
  <script src="./scripts/action-deck-data.js" defer></script>
  <script src="./scripts/action-cards.js" defer></script>
  <script src="./scripts/flight-card-data.js" defer></script>
  <script src="./scripts/flight-cards.js" defer></script>
  <script src="./scripts/particles.js" defer></script>
  <script src="./scripts/menu.js" defer></script>
  <script src="./scripts/main.js" defer></script>
</body>
</html>
